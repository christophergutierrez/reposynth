# ---------------------------------------------------------------------------
# Codebase conventions reference
# ---------------------------------------------------------------------------
codebase_conventions:
  repo: "videoamp/central — VideoAmp Go monorepo"

  error_handling:
    - "Wrap every error: fmt.Errorf(\"[CallerName]: %w\", err)"
    - "Never return bare err"
    - "Custom sentinels: &NotFoundError{EntityType: \"...\"}, ErrRead.Join(err)"
    - "eventdealer.WorkflowError has TWO relevant fields: Error error, SkipRetry bool"

  logging:
    - "Logger is *valog.Logger stored as struct field (r.logger, s.logger)"
    - "Debug enrichment: l := r.logger; if va_grpc.IsDebugEnabled(ctx) { l = &valog.Logger{Logger: l.With(zap.String(\"statement\", stmt))} }; l.Info(...)"
    - "l.With() returns *zap.Logger — MUST wrap in &valog.Logger{Logger: l.With(...)} to stay *valog.Logger"

  database:
    - "Template execution: r.template.ExecuteTemplate(&b, \"template_name\", params)"
    - "Named queries (SELECT): r.db.NamedQueryContext(ctx, stmt, params)"
    - "Named exec (INSERT/UPDATE/DELETE with no return): _, err = r.db.NamedExecContext(ctx, stmt, params)"
    - "Context timeout before I/O: ctx, cancel := context.WithTimeout(ctx, 10*time.Second); defer cancel()"

  grpc:
    - "Return status.Errorf(codes.InvalidArgument, ...) for validation failures"
    - "Map sql.ErrNoRows → status.Errorf(codes.NotFound, ...)"
    - "All other repo errors → status.Errorf(codes.Internal, ...)"
    - "NEVER return fmt.Errorf or errors.New from a gRPC handler"

  proto_conversion:
    - "Use req.GetXxx() accessor methods — NEVER direct field access (req.FieldName)"
    - "Domain→proto enum: pb.EnumType(pb.EnumType_value[s.Field])"
    - "Proto→domain enum: enumProtoValue.String()"
    - "time.Time → proto: timestamppb.New(s.CreatedAt)"

  pagination:
    - "Use sqlfunc.Paging{Limit: pageSize, Offset: offset} — NOT page*pageSize math"
    - "Caller passes offset int32 directly; function signature includes *valog.Logger and offset int32"

  http_clients:
    - "Auth: req.Header.Set(\"Authorization\", fmt.Sprintf(\"Bearer _%s\", masterKey))  ← underscore is mandatory"
    - "NEVER: \"Bearer \"+key, \"Bearer %s\", or other auth schemes"

  retry:
    - "Use plain time.Sleep(backoff) — NOT select{case <-time.After: case <-ctx.Done():}"
    - "NEVER create a fresh context.WithTimeout per retry attempt"
    - "Context cancellation checked at the TOP of the loop body"
