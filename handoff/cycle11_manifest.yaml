# ---------------------------------------------------------------------------
# Cycle 10 failure analysis (why cycle 11 looks like this)
# ---------------------------------------------------------------------------
cycle10_failure_analysis:
  named_exec_context_insert:
    problem: >
      29 contrast records (UPDATE + ErrSentinel variants) moved the 3-record average
      0.01 (0.40 → 0.39). Eval report revealed the root cause: adapter applies full
      template+logger+timeout boilerplate to query-constant functions. The previous
      contrast taught NamedExecContext with templates — it never showed the constant-
      query variant where NO template, NO logger, NO timeout is correct.
    fix: "named_exec_context_constant_not_template_boilerplate (18 records, seeded from adapter output)"

  proto_conversion:
    problem: >
      30 contrast records moved it +0.08 (0.14 → 0.22). Eval report showed adapter
      generates ToProtoXxx/ToEntityXxx (wrong direction naming) and uses bare
      unqualified constants instead of entity.XxxConst package constants.
    fix: "proto_conversion_function_naming_direction (12 records, seeded from adapter output)"

  grpc_status:
    problem: >
      30 contrast records moved it only +0.05 (0.09 → 0.14). Eval report showed
      the adapter DOES use status.Errorf with correct codes — contrast worked.
      The miss is VA-specific structural patterns (getRequestContext,
      NewListExportsRequestFromServiceRequest) that are idiosyncratic to this codebase
      and can't be taught by generic contrast pairs. Near a ceiling for what contrast
      can fix on holdout_v5_005.
    fix: "none — grpc_status miss is structural, not idiomatic"

