# ---------------------------------------------------------------------------
# Codebase conventions reference
# ---------------------------------------------------------------------------
codebase_conventions:
  repo: "videoamp/central — VideoAmp Go monorepo"

  error_handling:
    - "Wrap every error: fmt.Errorf(\"[CallerName]: %w\", err)"
    - "Never return bare err"
    - "Custom sentinels: &NotFoundError{EntityType: \"...\"}, ErrRead.Join(err)"
    - "Write layer: ErrInsertXxx.Join(err), ErrUpdateXxx.Join(err) — NOT fmt.Errorf"

  logging:
    - "l := r.logger; if va_grpc.IsDebugEnabled(ctx) { l = &valog.Logger{Logger: l.With(zap.String(\"statement\", stmt))} }; l.Info(...)"
    - "l.With() returns *zap.Logger — MUST wrap: &valog.Logger{Logger: l.With(...)}"

  database:
    - "Template-based: ExecuteTemplate → stmt → NamedQueryContext/NamedExecContext(ctx, stmt, params)"
    - "Constant-based: NamedExecContext(ctx, queryConst, params) — NO template, NO logger, NO timeout"
    - "Context timeout (template pattern only): ctx, cancel := context.WithTimeout(ctx, 10*time.Second); defer cancel()"
    - "Batch IN queries: sqlx.In(query, slice...) → db.Rebind(query) → SelectContext/QueryContext"

  grpc:
    - "Return status.Errorf(codes.InvalidArgument/NotFound/Internal, ...) — never fmt.Errorf"
    - "Map sql.ErrNoRows → codes.NotFound"

  proto_conversion:
    - "Function naming: ProtoToEntityXxx(pb.Xxx) string, EntityToProtoXxx(string) pb.Xxx"
    - "Use req.GetXxx() accessors — never direct field access"
    - "Enum: pb.EnumType(pb.EnumType_value[s.Field]) domain→proto; .String() proto→domain"
    - "Entity constants are package-qualified: entity.MethodologyXxx — never bare strings"

  http_clients:
    - "Auth: fmt.Sprintf(\"Bearer _%s\", masterKey) — underscore mandatory"

  retry:
    - "time.Sleep(backoff) — NOT select{case <-time.After: case <-ctx.Done():}"
    - "NOT a fresh context.WithTimeout per attempt"
