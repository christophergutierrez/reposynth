- name: aws_sdk_v1_sts_assume_role
  description: "AWS SDK v1 (github.com/aws/aws-sdk-go — NOT v2) STS AssumeRole: AssumeRoleWithContext, aws.String/aws.StringValue helpers, structured Credentials return, fmt.Errorf wrapping"
  n: 8
  tags: [aws_sdk, context, error_wrapping]
  reference: |
    func (c *stsClient) CreateSessionForArn(ctx context.Context, roleArn, sessionName string) (*Credentials, error) {
    	input := &sts.AssumeRoleInput{
    		RoleArn:         aws.String(roleArn),
    		RoleSessionName: aws.String(sessionName),
    	}

    	result, err := c.stsClient.AssumeRoleWithContext(ctx, input)
    	if err != nil {
    		return nil, fmt.Errorf("[sts.AssumeRole]: %w", err)
    	}

    	creds := result.Credentials
    	return &Credentials{
    		AccessKeyID:     aws.StringValue(creds.AccessKeyId),
    		SecretAccessKey: aws.StringValue(creds.SecretAccessKey),
    		SessionToken:    aws.StringValue(creds.SessionToken),
    		Expiration:      aws.TimeValue(creds.Expiration),
    	}, nil
    }

    // Note: import path is github.com/aws/aws-sdk-go/service/sts — NOT aws-sdk-go-v2

- name: json_unmarshal_http_response
  description: "HTTP GET with context, io.ReadAll on response body, json.Unmarshal into a typed struct, status code check before unmarshal, fmt.Errorf wrapping at every error site, defer resp.Body.Close()"
  n: 10
  tags: [http_client, json_unmarshal, error_wrapping]
  reference: |
    func (c *managementClient) IsValidInventory(ctx context.Context, inventoryID string) (bool, error) {
    	url := fmt.Sprintf("%s/inventory/%s/validate", c.baseURL, inventoryID)

    	req, err := http.NewRequestWithContext(ctx, http.MethodGet, url, nil)
    	if err != nil {
    		return false, fmt.Errorf("[http.NewRequestWithContext]: %w", err)
    	}
    	req.Header.Set("Authorization", fmt.Sprintf("Bearer %s", c.apiKey))

    	resp, err := c.httpClient.Do(req)
    	if err != nil {
    		return false, fmt.Errorf("[http.Client.Do]: %w", err)
    	}
    	defer resp.Body.Close()

    	body, err := io.ReadAll(resp.Body)
    	if err != nil {
    		return false, fmt.Errorf("[io.ReadAll]: %w", err)
    	}

    	if resp.StatusCode != http.StatusOK {
    		return false, fmt.Errorf("[http.Client.Do]: unexpected status %d: %s", resp.StatusCode, string(body))
    	}

    	var result struct {
    		Valid   bool   `json:"valid"`
    		Reason  string `json:"reason"`
    	}
    	if err := json.Unmarshal(body, &result); err != nil {
    		return false, fmt.Errorf("[json.Unmarshal]: %w", err)
    	}
    	return result.Valid, nil
    }

- name: json_unmarshal_list_response
  description: "HTTP GET returning a JSON array response, io.ReadAll, json.Unmarshal into a slice of structs, pagination or filter params encoded as query params, fmt.Errorf wrapping"
  n: 8
  tags: [http_client, json_unmarshal, error_wrapping]
  reference: |
    func (c *audienceClient) GetAudienceMetadata(ctx context.Context, segmentIDs []string) ([]AudienceMetadata, error) {
    	if len(segmentIDs) == 0 {
    		return nil, nil
    	}

    	u, err := url.Parse(fmt.Sprintf("%s/audiences/metadata", c.baseURL))
    	if err != nil {
    		return nil, fmt.Errorf("[url.Parse]: %w", err)
    	}
    	q := u.Query()
    	for _, id := range segmentIDs {
    		q.Add("segment_id", id)
    	}
    	u.RawQuery = q.Encode()

    	req, err := http.NewRequestWithContext(ctx, http.MethodGet, u.String(), nil)
    	if err != nil {
    		return nil, fmt.Errorf("[http.NewRequestWithContext]: %w", err)
    	}

    	resp, err := c.client.Do(req)
    	if err != nil {
    		return nil, fmt.Errorf("[http.Client.Do]: %w", err)
    	}
    	defer resp.Body.Close()

    	body, err := io.ReadAll(resp.Body)
    	if err != nil {
    		return nil, fmt.Errorf("[io.ReadAll]: %w", err)
    	}

    	if resp.StatusCode != http.StatusOK {
    		return nil, fmt.Errorf("[http.Client.Do]: status %d", resp.StatusCode)
    	}

    	var result []AudienceMetadata
    	if err := json.Unmarshal(body, &result); err != nil {
    		return nil, fmt.Errorf("[json.Unmarshal]: %w", err)
    	}
    	return result, nil
    }

- name: proto_conversion_domain_to_proto
  description: "Pure conversion function from internal domain struct to proto message; field-by-field mapping using .String() for enum values, timestamppb.New() for time.Time fields, no error return"
  n: 10
  tags: [proto_conversion]
  reference: |
    func (s *Segment) ToProto() *pb.Segment {
    	return &pb.Segment{
    		Id:          s.ID,
    		Name:        s.Name,
    		OrgId:       s.OrgID,
    		Status:      pb.SegmentStatus(pb.SegmentStatus_value[s.Status]),
    		Description: s.Description,
    		CreatedAt:   timestamppb.New(s.CreatedAt),
    		UpdatedAt:   timestamppb.New(s.UpdatedAt),
    	}
    }

    func ToSegmentListResponse(segments []Segment, totalCount int64) *pb.ListSegmentsResponse {
    	pbSegments := make([]*pb.Segment, 0, len(segments))
    	for _, s := range segments {
    		pbSegments = append(pbSegments, s.ToProto())
    	}
    	return &pb.ListSegmentsResponse{
    		Segments:   pbSegments,
    		TotalCount: totalCount,
    	}
    }

