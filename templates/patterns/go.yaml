- name: retry_logic_with_context_deadline
  description: "HTTP retry loop: up to 3 attempts, plain time.Sleep(backoff) between attempts — NOT select/channel, retry only 5xx responses, non-retryable errors (4xx, parse errors) return immediately, Bearer _%s master key auth, lastErr pattern, fmt.Errorf wrapping"
  n: 10
  tags: [http_client, retry_logic, context, error_wrapping]
  reference: |
    func (c *graphClient) GetAccessGraph(ctx context.Context, tenantID string) (*AccessGraph, error) {
    	url := fmt.Sprintf("%s/tenants/%s/access-graph", c.baseURL, tenantID)

    	var lastErr error
    	for attempt := 0; attempt < 3; attempt++ {
    		if attempt > 0 {
    			time.Sleep(time.Duration(1<<uint(attempt-1)) * time.Second)
    		}

    		req, err := http.NewRequestWithContext(ctx, http.MethodGet, url, nil)
    		if err != nil {
    			return nil, fmt.Errorf("[http.NewRequestWithContext]: %w", err)
    		}
    		req.Header.Set("Authorization", fmt.Sprintf("Bearer _%s", c.masterKey))

    		resp, err := c.client.Do(req)
    		if err != nil {
    			lastErr = fmt.Errorf("[http.Client.Do]: %w", err)
    			continue
    		}
    		body, err := io.ReadAll(resp.Body)
    		resp.Body.Close()
    		if err != nil {
    			return nil, fmt.Errorf("[io.ReadAll]: %w", err)
    		}
    		if resp.StatusCode >= 500 {
    			lastErr = fmt.Errorf("[http.Client.Do]: server error %d", resp.StatusCode)
    			continue
    		}
    		if resp.StatusCode != http.StatusOK {
    			return nil, fmt.Errorf("[http.Client.Do]: status %d", resp.StatusCode)
    		}
    		var result AccessGraph
    		if err := json.Unmarshal(body, &result); err != nil {
    			return nil, fmt.Errorf("[json.Unmarshal]: %w", err)
    		}
    		return &result, nil
    	}
    	return nil, fmt.Errorf("[GetAccessGraph]: max retries exceeded: %w", lastErr)
    }

- name: retry_logic_post_with_body
  description: "HTTP POST retry loop with JSON request body (json.Marshal + bytes.NewReader), plain time.Sleep(backoff) — NOT select/channel, retry on 5xx or 429, lastErr tracking, Bearer _%s master key auth, fmt.Errorf wrapping"
  n: 8
  tags: [http_client, retry_logic, context, error_wrapping]
  reference: |
    func (c *notificationClient) SendNotification(ctx context.Context, req NotificationRequest) error {
    	body, err := json.Marshal(req)
    	if err != nil {
    		return fmt.Errorf("[json.Marshal]: %w", err)
    	}

    	var lastErr error
    	for attempt := 0; attempt < 3; attempt++ {
    		if attempt > 0 {
    			time.Sleep(time.Duration(1<<uint(attempt-1)) * time.Second)
    		}

    		httpReq, err := http.NewRequestWithContext(ctx, http.MethodPost, c.endpoint, bytes.NewReader(body))
    		if err != nil {
    			return fmt.Errorf("[http.NewRequestWithContext]: %w", err)
    		}
    		httpReq.Header.Set("Content-Type", "application/json")
    		httpReq.Header.Set("Authorization", fmt.Sprintf("Bearer _%s", c.masterKey))

    		resp, err := c.client.Do(httpReq)
    		if err != nil {
    			lastErr = fmt.Errorf("[http.Client.Do]: %w", err)
    			continue
    		}
    		resp.Body.Close()

    		if resp.StatusCode == http.StatusTooManyRequests || resp.StatusCode >= 500 {
    			lastErr = fmt.Errorf("[http.Client.Do]: status %d", resp.StatusCode)
    			continue
    		}
    		if resp.StatusCode != http.StatusOK && resp.StatusCode != http.StatusCreated {
    			return fmt.Errorf("[http.Client.Do]: unexpected status %d", resp.StatusCode)
    		}
    		return nil
    	}
    	return fmt.Errorf("[SendNotification]: max retries exceeded: %w", lastErr)
    }

