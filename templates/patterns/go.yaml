- name: retry_logic_http_backoff
  description: "HTTP retry loop with exponential backoff (3 attempts), context.Done() check during sleep, retry only on 5xx, non-retryable errors returned immediately, fmt.Errorf wrapping, lastErr tracking"
  n: 8
  tags: [http_client, retry_logic, context, error_wrapping]
  reference: |
    func (c *graphClient) GetAccessGraph(ctx context.Context, tenantID string) (*AccessGraph, error) {
    	url := fmt.Sprintf("%s/tenants/%s/access-graph", c.baseURL, tenantID)

    	var lastErr error
    	for attempt := 0; attempt < 3; attempt++ {
    		if attempt > 0 {
    			backoff := time.Duration(1<<uint(attempt-1)) * time.Second
    			select {
    			case <-time.After(backoff):
    			case <-ctx.Done():
    				return nil, fmt.Errorf("[GetAccessGraph]: context canceled: %w", ctx.Err())
    			}
    		}

    		req, err := http.NewRequestWithContext(ctx, http.MethodGet, url, nil)
    		if err != nil {
    			return nil, fmt.Errorf("[http.NewRequestWithContext]: %w", err)
    		}
    		req.Header.Set("Authorization", fmt.Sprintf("Bearer %s", c.apiKey))

    		resp, err := c.client.Do(req)
    		if err != nil {
    			lastErr = fmt.Errorf("[http.Client.Do]: %w", err)
    			continue
    		}

    		body, err := io.ReadAll(resp.Body)
    		resp.Body.Close()
    		if err != nil {
    			return nil, fmt.Errorf("[io.ReadAll]: %w", err)
    		}

    		if resp.StatusCode >= 500 {
    			lastErr = fmt.Errorf("[http.Client.Do]: server error %d", resp.StatusCode)
    			continue
    		}
    		if resp.StatusCode != http.StatusOK {
    			return nil, fmt.Errorf("[http.Client.Do]: request returned http status %d", resp.StatusCode)
    		}

    		var result AccessGraph
    		if err := json.Unmarshal(body, &result); err != nil {
    			return nil, fmt.Errorf("[json.Unmarshal]: %w", err)
    		}
    		return &result, nil
    	}
    	return nil, fmt.Errorf("[GetAccessGraph]: max retries exceeded: %w", lastErr)
    }

- name: event_routing_switch
  description: "Single workflow processor method that receives an event and routes it to typed handler methods via switch statement; valog struct field logger; fmt.Errorf wrapping at each handler call; default case logs and returns nil"
  n: 8
  tags: [event_routing, valog, error_wrapping]
  reference: |
    func (w *auth0EventWorker) ProcessAuth0Events(ctx context.Context, event auth0.WebhookEvent) error {
    	w.logger.Info("processing auth0 event",
    		zap.String("event_type", event.Type),
    		zap.String("user_id", event.Data.UserID),
    	)

    	switch event.Type {
    	case "post-login":
    		if err := w.handlePostLogin(ctx, event.Data); err != nil {
    			return fmt.Errorf("[handlePostLogin]: %w", err)
    		}
    	case "post-change-password":
    		if err := w.handlePostChangePassword(ctx, event.Data); err != nil {
    			return fmt.Errorf("[handlePostChangePassword]: %w", err)
    		}
    	case "send-phone-message":
    		if err := w.handleSendPhoneMessage(ctx, event.Data); err != nil {
    			return fmt.Errorf("[handleSendPhoneMessage]: %w", err)
    		}
    	default:
    		w.logger.Warn("unhandled event type, skipping",
    			zap.String("event_type", event.Type),
    		)
    	}
    	return nil
    }

- name: pagination_defaults_proto_to_params
  description: "Convert a proto request to a params struct, applying default values for page size (100) and page number (1) when the proto fields are zero, using req.GetXxx() accessor pattern"
  n: 8
  tags: [proto_conversion, pagination_defaults]
  reference: |
    func ToRequestParams(req *pb.ListSegmentsRequest) ListSegmentsParams {
    	pageSize := req.GetPageSize()
    	if pageSize == 0 {
    		pageSize = 100
    	}
    	page := req.GetPage()
    	if page == 0 {
    		page = 1
    	}
    	return ListSegmentsParams{
    		Page:       page,
    		PageSize:   pageSize,
    		OrgID:      req.GetOrgId(),
    		NameFilter: req.GetNameFilter(),
    		Status:     req.GetStatus().String(),
    	}
    }

