# Go pattern catalog for reposynth booster generation
#
# Each entry produces `n` training variations using the `reference` as a
# few-shot example. The LLM generates diverse (user_request, code_response)
# pairs that apply the same pattern to different scenarios.
#
# Fields:
#   name:        Unique identifier (used in _source metadata)
#   description: What this pattern demonstrates (injected into prompt)
#   reference:   Real production code snippet — the model mirrors this pattern
#   n:           Number of training variations to generate
#   tags:        Optional list of convention tags (used by health check)
#
# To add a new pattern: append an entry and re-run: reposynth generate --only booster

- name: sqlx_named_query_template_single_row
  description: "SQL template execution followed by NamedQueryContext, context timeout, sql.ErrNoRows check, StructScan for single-row result, valog struct field with conditional debug enrichment"
  n: 8
  tags: [sqlx, valog, context_timeout, sql_template, error_wrapping]
  reference: |
    func (r *audienceExportRepository) GetSegmentVersion(ctx context.Context, params GetSegmentVersionParams) (results GetSegmentVersionResult, err error) {
    	var b bytes.Buffer

    	err = r.template.ExecuteTemplate(&b, "get_segment_version", params)
    	if err != nil {
    		return results, fmt.Errorf(`[ExecuteTemplate]: %w`, err)
    	}

    	stmt := b.String()

    	l := r.logger
    	if va_grpc.IsDebugEnabled(ctx) {
    		l = &valog.Logger{
    			Logger: l.With(
    				zap.String("statement", stmt),
    			),
    		}
    	}
    	l.Info("GetSegmentVersion sql statement",
    		zap.Any("params", params),
    		zap.String("template_name", "get_segment_version"),
    	)

    	ctx, cancel := context.WithTimeout(ctx, 10*time.Second)
    	defer cancel()

    	var (
    		res  GetSegmentVersionResult
    		rows *sqlx.Rows
    	)
    	if rows, err = r.db.NamedQueryContext(ctx, stmt, params); err != nil {
    		if err == sql.ErrNoRows {
    			return results, nil
    		}
    		return results, fmt.Errorf(`[NamedQueryContext]: %w`, err)
    	}

    	if rows == nil {
    		return results, fmt.Errorf(`[NamedQueryContext]: nil rows returned`)
    	}

    	if !rows.Next() {
    		return results, nil
    	}

    	if err = rows.StructScan(&res); err != nil {
    		return results, fmt.Errorf(`[StructScan]: %w`, err)
    	}

    	if rows.Next() {
    		return results, fmt.Errorf(`[InternalError]: Multiple results found for this Entity`)
    	}

    	return res, nil
    }

- name: sqlx_named_query_template_delete_returning
  description: "SQL template with switch-based template name selection, NamedQueryContext for a DELETE RETURNING query, context timeout, NotFoundError custom type, StructScan for the returned row"
  n: 8
  tags: [sqlx, valog, context_timeout, sql_template, error_wrapping, custom_error_type]
  reference: |
    func (r *audienceExportRepository) DeleteExport(ctx context.Context, params DeleteExportParams) (results DeleteExportResult, err error) {
    	var (
    		b            bytes.Buffer
    		templateName string
    	)

    	switch params.SegmentType {
    	case "COMPOSITE":
    		templateName = "delete_audience_export"
    	default:
    		templateName = "delete_segment_version_export"
    	}

    	err = r.template.ExecuteTemplate(&b, templateName, params)
    	if err != nil {
    		return DeleteExportResult{}, fmt.Errorf("[ExecuteTemplate]: %w", err)
    	}

    	stmt := b.String()

    	l := r.logger
    	if va_grpc.IsDebugEnabled(ctx) {
    		l = &valog.Logger{
    			Logger: l.With(
    				zap.String("statement", stmt),
    			),
    		}
    	}
    	l.Info("DeleteExport sql statement",
    		zap.Any("params", params),
    		zap.String("template_name", templateName),
    	)

    	ctx, cancel := context.WithTimeout(ctx, 10*time.Second)
    	defer cancel()

    	var rows *sqlx.Rows

    	if rows, err = r.db.NamedQueryContext(ctx, stmt, params); err != nil {
    		if err == sql.ErrNoRows {
    			return results, &NotFoundError{EntityType: "Export"}
    		}

    		return results, fmt.Errorf("[NamedQueryContext]: %w", err)
    	}
    	defer rows.Close()

    	if rows == nil || !rows.Next() {
    		return results, fmt.Errorf(`nil rows returned`)
    	}

    	var res DeleteExportResult
    	if err := rows.StructScan(&res); err != nil {
    		return results, fmt.Errorf("[StructScan]: %w", err)
    	}

    	return res, nil
    }

- name: sqlx_named_query_row_iteration
  description: "SQL template execution, NamedQueryContext, rows.Next() iteration loop, StructScan each row into a slice, rows.Err() check after loop, valog struct field logger"
  n: 8
  tags: [sqlx, valog, row_iteration, sql_template, error_wrapping]
  reference: |
    func (r *taxonomyRepository) ListTaxonomies(ctx context.Context, params ListTaxonomiesParams) (ListTaxonomiesResults, error) {
    	var buf bytes.Buffer
    	err := r.template.ExecuteTemplate(&buf, "list_taxonomies", params)
    	if err != nil {
    		r.logger.Error("Failed to execute list_taxonomies template", zap.Error(err))
    		return ListTaxonomiesResults{}, fmt.Errorf("[ExecuteTemplate] failed to execute list_taxonomies template: %w", err)
    	}
    	query := buf.String()
    	r.logger.Info("Executing list_taxonomies query", zap.String("sql", query), zap.Any("params", params))

    	rows, err := r.db.NamedQueryContext(ctx, query, params)
    	if err != nil {
    		r.logger.Error("Failed to execute list_taxonomies query", zap.Error(err))
    		return ListTaxonomiesResults{}, fmt.Errorf("[NamedQueryContext] failed to execute list_taxonomies query: %w", err)
    	}
    	defer rows.Close()

    	var items []TaxonomyRow
    	var totalCount int64

    	for rows.Next() {
    		var row TaxonomyRow
    		if err := rows.StructScan(&row); err != nil {
    			r.logger.Error("Failed to scan taxonomy row", zap.Error(err))
    			return ListTaxonomiesResults{}, fmt.Errorf("[StructScan] failed to scan taxonomy row: %w", err)
    		}
    		if len(items) == 0 {
    			totalCount = row.TotalCount
    		}
    		items = append(items, row)
    	}

    	if err := rows.Err(); err != nil {
    		r.logger.Error("Error iterating over taxonomy rows", zap.Error(err))
    		return ListTaxonomiesResults{}, fmt.Errorf("[RowsErr] failed to iterate over taxonomy rows: %w", err)
    	}

    	return ListTaxonomiesResults{Taxonomies: items, TotalCount: totalCount}, nil
    }

- name: sqlx_in_rebind_select_context
  description: "sqlx.In to expand a slice into an IN clause, db.Rebind to rewrite ? placeholders for Postgres, SelectContext to scan multiple rows into a slice"
  n: 8
  tags: [sqlx, valog, batch_operation, sqlx_in, error_wrapping]
  reference: |
    func (r *reportConfigurationRepository) BatchDeleteReport(ctx context.Context, reportIds []int64) ([]int64, error) {
    	if len(reportIds) == 0 {
    		return nil, fmt.Errorf("[BatchDeleteReport] no report IDs provided")
    	}

    	r.logger.Info("Start batch deleting reports", zap.Int64s("report_ids", reportIds))

    	query, args, err := sqlx.In(scheduleUpdateQuery, reportIds)
    	if err != nil {
    		return nil, fmt.Errorf("[sqlx.In] failed to construct batch delete query: %w", err)
    	}
    	query = r.postgresDB.Rebind(query)

    	var updatedIDs []int64
    	err = r.postgresDB.SelectContext(ctx, &updatedIDs, query, args...)
    	if err != nil {
    		return nil, fmt.Errorf("[SelectContext] failed to execute batch delete: %w", err)
    	}
    	r.logger.Info("Successfully batch deleted reports", zap.Int64s("deleted_ids", updatedIDs))
    	return updatedIDs, nil
    }

- name: valog_struct_field_conditional_enrichment
  description: "Logger stored as a struct field (r.logger *valog.Logger), conditional enrichment via &valog.Logger{Logger: l.With(zap.Field...)} for debug contexts, Info/Error/Warn calls with structured zap fields"
  n: 6
  tags: [valog, logging]
  reference: |
    // Logger is stored as a struct field — never retrieved from context.
    // The pattern for conditional debug enrichment:

    l := r.logger
    if va_grpc.IsDebugEnabled(ctx) {
    	l = &valog.Logger{
    		Logger: l.With(
    			zap.String("statement", stmt),
    			zap.Any("params", params),
    		),
    	}
    }
    l.Info("operation name",
    	zap.String("template_name", templateName),
    	zap.Any("params", params),
    )

    // Struct definition:
    type myRepository struct {
    	db       *sqlx.DB
    	logger   *valog.Logger
    	template *template.Template
    }

    // Constructor:
    func NewMyRepository(db *sqlx.DB, logger *valog.Logger, tmpl *template.Template) *myRepository {
    	return &myRepository{db: db, logger: logger, template: tmpl}
    }

- name: http_client_with_context_request
  description: "http.NewRequestWithContext, setting Authorization and custom headers, http.Client.Do, io.ReadAll, status code check, json.Unmarshal, fmt.Errorf wrapping at each step"
  n: 6
  tags: [http_client, context, error_wrapping]
  reference: |
    func (c userInfoClient) GetIdentity(ctx context.Context, legacyUserId int64) (resp UserIdentity, err error) {
    	url := fmt.Sprintf("%s/auth/v2/users/identify", c.baseUrl)

    	r, err := http.NewRequestWithContext(ctx, http.MethodGet, url, nil)
    	if err != nil {
    		return resp, fmt.Errorf("[http.NewRequest]: %w", err)
    	}

    	r.Header.Set("Content-Type", "application/json")
    	r.Header.Set("Authorization", fmt.Sprintf("Bearer _%s", c.masterKey))
    	r.Header.Set("x-api-key-user-id", strconv.FormatInt(legacyUserId, 10))

    	c.log.Debug("[GetIdentity]: request user",
    		zap.String("url", r.URL.String()),
    	)

    	doResp, err := c.client.Do(r)
    	if err != nil {
    		return resp, fmt.Errorf("[http.Client.Do]: %w", err)
    	}

    	body, err := io.ReadAll(doResp.Body)
    	if err != nil {
    		return resp, fmt.Errorf("[io.ReadAll]: %w", err)
    	}
    	doResp.Body.Close()

    	if doResp.StatusCode != http.StatusOK {
    		return resp, fmt.Errorf("[http.Client.Do]: request returned http status %d", doResp.StatusCode)
    	}

    	err = json.Unmarshal(body, &resp)
    	if err != nil {
    		return resp, fmt.Errorf("[json.Unmarshal]: %w", err)
    	}

    	return resp, nil
    }

- name: fmt_errorf_wrapping_convention
  description: "Consistent fmt.Errorf wrapping at every error site with [FuncName]: prefix, never bare return err, never errors.New(err.Error())"
  n: 6
  tags: [error_wrapping]
  reference: |
    // CORRECT patterns:
    if err := validateSpec(spec); err != nil {
    	return fmt.Errorf("[validateSpec]: %w", err)
    }
    if err := s.internalClient.GetResources(spec); err != nil {
    	return fmt.Errorf("[s.internalClient.GetResources]: %w", err)
    }
    if err := rows.StructScan(&res); err != nil {
    	return results, fmt.Errorf("[StructScan]: %w", err)
    }

    // WRONG — never do these:
    return errors.New(err.Error())          // breaks error chain
    return fmt.Errorf("failed to validate: %w", err)  // no [bracket] prefix
    return err                              // bare return, no context

- name: grpc_status_not_found
  description: "Returning gRPC status codes (codes.NotFound, codes.InvalidArgument, codes.Internal) using status.Errorf, checking for sql.ErrNoRows and mapping to codes.NotFound"
  n: 6
  tags: [grpc_status, error_wrapping]
  reference: |
    func (s *segmentService) GetSegment(ctx context.Context, req *pb.GetSegmentRequest) (*pb.GetSegmentResponse, error) {
    	if req.GetId() == "" {
    		return nil, status.Errorf(codes.InvalidArgument, "segment id is required")
    	}

    	seg, err := s.repo.GetSegment(ctx, repository.GetSegmentParams{Id: req.GetId()})
    	if err != nil {
    		if errors.Is(err, sql.ErrNoRows) {
    			return nil, status.Errorf(codes.NotFound, "segment %q not found", req.GetId())
    		}
    		return nil, status.Errorf(codes.Internal, "failed to get segment: %v", err)
    	}

    	return &pb.GetSegmentResponse{Segment: seg.ToProto()}, nil
    }

