- name: named_exec_context_write_with_tx
  description: "SQL template execution, NamedExecContext inside a transaction (MustBegin / defer Rollback / Commit), RowsAffected check returning &NotFoundError{EntityType} when zero rows affected, fmt.Errorf wrapping"
  n: 10
  tags: [sqlx, custom_error_type, error_wrapping]
  reference: |
    func (r *segmentRepository) DeleteInitiativeSegmentVersion(ctx context.Context, params DeleteInitiativeSegmentVersionParams) (err error) {
    	var b bytes.Buffer
    	templateName := "delete_segment_version_by_initiative"

    	err = r.template.ExecuteTemplate(&b, templateName, params)
    	if err != nil {
    		return fmt.Errorf("[ExecuteTemplate]: %w", err)
    	}

    	stmt := strings.TrimSpace(b.String())

    	tx := r.db.MustBegin()
    	defer tx.Rollback()

    	rows, err := tx.NamedExecContext(ctx, stmt, params)
    	if err != nil {
    		if err == sql.ErrNoRows {
    			return &NotFoundError{EntityType: "SegmentVersion"}
    		}
    		return fmt.Errorf("[NamedExecContext]: %w", err)
    	}
    	if rows == nil {
    		return &NotFoundError{EntityType: "SegmentVersion"}
    	}
    	if err := tx.Commit(); err != nil {
    		return fmt.Errorf("[Commit]: %w", err)
    	}
    	rowsAffected, err := rows.RowsAffected()
    	if err != nil {
    		return fmt.Errorf("[res.RowsAffected]: %w", err)
    	}
    	if rowsAffected == 0 {
    		return &NotFoundError{EntityType: "SegmentVersion"}
    	}
    	return nil
    }

