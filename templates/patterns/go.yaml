- name: errread_join
  description: "Service and repository methods propagating errors via ErrRead.Join(err) instead of fmt.Errorf; ErrRead is a package-level sentinel *errors.ErrorType; EVERY error site calls ErrRead.Join — including empty-result checks (len==0) and nil-row checks; never bare return err, never fmt.Errorf for read failures"
  n: 20
  tags: [error_wrapping]
  reference: |
    func (s *service) GetGenre(ctx context.Context, request *pb.GetGenreRequest) (*pb.Genre, error) {
    	ctx, cancel := context.WithTimeout(ctx, defaultTimeout)
    	defer cancel()

    	resp, err := s.repo.Get(ctx, request)
    	if err != nil {
    		return nil, ErrRead.Join(err)
    	}
    	result, err := resp.ToProto()
    	if err != nil {
    		return nil, ErrRead.Join(err)
    	}
    	return result, nil
    }

    func (r *repository) Get(ctx context.Context, request *pb.GetGenreRequest) (*entity.Genre, error) {
    	var result entity.Genre
    	query, args, err := r.templateMap.CreateQuery(r.db, templateModel, querybuilder.GetTmpl)
    	if err != nil {
    		return nil, ErrRead.Join(err)
    	}
    	if err = r.db.GetContext(ctx, &result, query, args...); err != nil {
    		return nil, ErrRead.Join(err)
    	}
    	return &result, nil
    }

    // ErrRead.Join is used for empty results too — not just query failures:
    func (f *forecastedReachCurvesRepository) GetReachCurves(ctx context.Context, datasourceUUID string, audienceScaling float64, audienceId, audienceLevel, startDs, endDs, viewershipTypeId int64) ([]*entity.ReachCurve, error) {
    	maxRunId, err := f.reachCurveRepo.GetMaxRunId(ctx, params)
    	if err != nil {
    		return nil, ErrRead.Join(err)
    	}

    	reachCurves, err := f.reachCurveRepo.Get(ctx, params)
    	if err != nil {
    		return nil, ErrRead.Join(err)
    	}

    	if len(reachCurves) == 0 {
    		return nil, ErrRead.Join(fmt.Errorf("reach curves not found in db"))
    	}

    	return reachCurves, nil
    }

- name: eventdealer_workflow_error
  description: "Event processor function returning eventdealer.WorkflowError (NOT error); happy path returns WorkflowError{}; error paths return WorkflowError{Error: fmt.Errorf(...), SkipRetry: true}; non-fatal skips (heartbeat, unknown type) return WorkflowError{}; event routing via switch on event type string"
  n: 12
  tags: [event_routing, error_wrapping, valog]
  reference: |
    func (p UserOnboardingProcessor) ProcessAuth0Events(ctx context.Context, message string, log valog.Logger) eventdealer.WorkflowError {
    	log.Info("running ProcessAuth0Events workflow", zap.String("message", message))
    	event, err := ParseAuth0CloudEventMessage([]byte(message))
    	if err != nil {
    		log.Error("[ProcessAuth0Events.ParseAuth0CloudEventMessage]", zap.Error(err))
    		return eventdealer.WorkflowError{Error: fmt.Errorf("[ProcessAuth0Events.ParseAuth0CloudEventMessage]: %w", err)}
    	}

    	if event.Type() == "auth0.heartbeat" {
    		return eventdealer.WorkflowError{}
    	}

    	var payload map[string]any
    	if err := json.Unmarshal(event.Data(), &payload); err != nil {
    		return eventdealer.WorkflowError{Error: fmt.Errorf("[Unmarshal]: failed to unmarshal the 'data' field into map: %w", err)}
    	}

    	detail, ok := payload["detail"].(map[string]any)
    	if !ok {
    		return eventdealer.WorkflowError{Error: fmt.Errorf("[detail]: missing or invalid")}
    	}

    	data, ok := detail["data"].(map[string]any)
    	if !ok {
    		return eventdealer.WorkflowError{Error: fmt.Errorf("[data]: missing or invalid")}
    	}

    	switch event.Type() {
    	case AUTH0_SYSTEM_API_OPERATION:
    		return p.handleSystemAPIEvent(ctx, data, log)
    	case AUTH0_USER_BLOCKED_MULTIPLE_FAILED_LOGINS:
    		return p.handleUserBlockedEvent(ctx, data, log)
    	default:
    		log.Info("[ProcessAuth0Events] Unknown event type, skipping", zap.String("event_type", event.Type()))
    		return eventdealer.WorkflowError{}
    	}
    }

- name: valog_debug_conditional_full_function
  description: "Complete repository function demonstrating the three-part valog debug pattern as an inseparable unit: (1) l := r.logger, (2) if va_grpc.IsDebugEnabled(ctx) { l = &valog.Logger{Logger: l.With(zap.String(\"statement\", stmt))} }, (3) l.Info(...) — all three parts must appear together in this exact order"
  n: 15
  tags: [sqlx, valog, context_timeout, error_wrapping]
  reference: |
    func (r *audienceExportRepository) GetEntityExportSetting(ctx context.Context, params GetExportSettingParams) (results models.EntityExportSetting, err error) {
    	var b bytes.Buffer

    	err = r.template.ExecuteTemplate(&b, "read_export_setting", params)
    	if err != nil {
    		return results, fmt.Errorf(`[ExecuteTemplate]: %w`, err)
    	}

    	stmt := b.String()

    	l := r.logger
    	if va_grpc.IsDebugEnabled(ctx) {
    		l = &valog.Logger{
    			Logger: l.With(
    				zap.String("statement", stmt),
    			),
    		}
    	}
    	l.Info("GetEntityExportSetting sql statement",
    		zap.Any("params", params),
    		zap.String("template_name", "read_export_setting"),
    	)

    	ctx, cancel := context.WithTimeout(ctx, 10*time.Second)
    	defer cancel()

    	var (
    		res  models.EntityExportSetting
    		rows *sqlx.Rows
    	)
    	if rows, err = r.db.NamedQueryContext(ctx, stmt, params); err != nil {
    		if err == sql.ErrNoRows {
    			return models.EntityExportSetting{}, nil
    		}
    		return results, fmt.Errorf(`[NamedQueryContext]: %w`, err)
    	}

    	if rows == nil {
    		return results, fmt.Errorf(`[NamedQueryContext]: nil rows returned`)
    	}

    	if !rows.Next() {
    		return results, nil
    	}

    	if err = rows.StructScan(&res); err != nil {
    		return results, fmt.Errorf(`[StructScan]: %w`, err)
    	}

    	if rows.Next() {
    		return results, fmt.Errorf(`[InternalError]: Multiple results found for this Entity`)
    	}

    	return res, nil
    }
