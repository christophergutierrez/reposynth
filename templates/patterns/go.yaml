    	var segmentIDs []string
    	for _, id := range req.GetSegmentIds() {
    		segmentIDs = append(segmentIDs, id)
    	}
    	return ListExportsParams{
    		Page:       page,
    		PageSize:   pageSize,
    		SegmentIDs: segmentIDs,
    		OrgID:      req.GetOrgId(),
    	}
    }

