- name: python_dataclass_with_validation
  description: "Python dataclass with field validation in __post_init__, type hints, Optional fields with defaults, ValueError for invalid state"
  n: 6
  tags: [dataclass, validation]
  reference: |
    from dataclasses import dataclass, field
    from typing import Optional
    from datetime import datetime

    @dataclass
    class SegmentParams:
        org_id: str
        name: str
        status: str = "ACTIVE"
        page: int = 1
        page_size: int = 100
        created_after: Optional[datetime] = None

        def __post_init__(self):
            if not self.org_id:
                raise ValueError("org_id is required")
            if not self.name:
                raise ValueError("name is required")
            if self.page < 1:
                raise ValueError(f"page must be >= 1, got {self.page}")
            if self.page_size < 1 or self.page_size > 1000:
                raise ValueError(f"page_size must be 1–1000, got {self.page_size}")

- name: python_async_http_client
  description: "Async HTTP client with aiohttp, timeout, retry on 5xx, structured error logging, typed response model"
  n: 6
  tags: [http_client, async, retry_logic]
  reference: |
    import asyncio
    import logging
    from typing import Any

    import aiohttp

    log = logging.getLogger(__name__)

    async def get_json(session: aiohttp.ClientSession, url: str, timeout: float = 10.0) -> Any:
        for attempt in range(3):
            try:
                async with session.get(url, timeout=aiohttp.ClientTimeout(total=timeout)) as resp:
                    if resp.status >= 500:
                        log.warning("Server error %d on attempt %d for %s", resp.status, attempt + 1, url)
                        await asyncio.sleep(2 ** attempt)
                        continue
                    resp.raise_for_status()
                    return await resp.json()
            except aiohttp.ClientError as e:
                if attempt == 2:
                    raise
                log.warning("Request error on attempt %d for %s: %s", attempt + 1, url, e)
                await asyncio.sleep(2 ** attempt)
        raise RuntimeError(f"Max retries exceeded for {url}")
