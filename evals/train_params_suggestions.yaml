#   - Well-represented conventions still underperform: error_wrapping (n=20,
#     avg 0.37), valog (n=12, avg 0.46), sqlx (n=9, avg 0.52). Shape is right,
#     specific tokens are lost — consistent with a LoRA capacity ceiling.
#
# Therefore the only parameter change proposed is a rank bump to give the
# adapter headroom on the conventions where data is adequate. Everything else
