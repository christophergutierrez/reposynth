suggestions:
  - param: lora_rank
    current: 16
    proposed: 32
    rationale: >
      Conventions with sufficient training volume (error_wrapping n=20 at 0.37,
      valog n=12 at 0.46, sqlx n=9 at 0.52) still miss specific tokens while
      getting structural shape right. That pattern reads as capacity-limited,
      not data-limited. Doubling rank is the cheapest way to test that read
      before any further architectural changes.

  - param: lora_alpha
    current: 32
    proposed: 64
    rationale: >
      Maintain the existing 2:1 alpha:rank ratio when bumping rank to 32.
      Changing the ratio alongside rank would confound the diagnostic.

# Explicit holds — do not change, with reason, so LLMy knows these were
# considered and declined rather than overlooked.
holds:
  - param: learning_rate
    current: 2.0e-4
    reason: >
      No plateau or divergence signal in the logs that would justify a change.
      Data gaps dominate the remaining error; adjusting LR now would muddy the
      signal from the next data-enriched run.

  - param: max_steps
    current: 2000
    reason: >
      Adding steps on thin data invites overfitting on sparse conventions.
      Revisit only after synth_status.yaml boosts land and n per convention
      rises.

  - param: warmup_steps
    current: 50
    reason: >
      Loss curve is well-behaved through warmup; no evidence of instability.

  - param: weight_decay
    current: 0.01
    reason: >
      Holding constant while rank changes, so any regression can be attributed
      to the rank bump alone.

  - param: lora_dropout
    current: 0
    reason: >
      Consider 0.05 only if excellent/good count stops growing after rank bump
      *and* the dataset has been enriched. Premature regularization on thin
      data will hurt more than help.

# Broader directives that aren't single-parameter changes.
