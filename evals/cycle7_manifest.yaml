# ---------------------------------------------------------------------------
# Fixes applied this cycle — training machine should NOT re-suggest these
# as data gaps; they were addressed in the pattern catalog.
# ---------------------------------------------------------------------------
fixes_applied:
  - id: bearer_underscore
    description: >
      4 patterns were generating Bearer %s (no underscore). All fixed to
      Bearer _%s (underscore between "Bearer" and the key). Affects:
      json_unmarshal_http_response, retry_logic_http_backoff,
      retry_logic_with_context_deadline, retry_logic_post_with_body.

  - id: aws_sdk_v1_credentials
    description: >
      aws_sdk_v1_sts_assume_role reference replaced with real production
      function (CreateSessionForArn). Now uses credentials.NewStaticCredentials
      with *pointer dereference on creds fields and MaxRetries: aws.Int(5).
      n bumped from 8 to 15.

  - id: retry_select_to_sleep
    description: >
      All three HTTP retry patterns used select{case <-time.After: case <-ctx.Done():}
      for backoff sleep. Fixed to plain time.Sleep(backoff). New pattern
      retry_logic_for_loop_sleep (n:15) added with DeleteFromQueue reference.

  - id: errread_join_empty_result
    description: >
      errread_join reference now explicitly shows ErrRead.Join on empty-result
      path. n bumped from 12 to 20.

