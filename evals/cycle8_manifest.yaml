# ---------------------------------------------------------------------------
# Codebase conventions reference
# ---------------------------------------------------------------------------
codebase_conventions:
  repo: "videoamp/central — VideoAmp Go monorepo"

  error_handling:
    - "Wrap every error: fmt.Errorf(\"[CallerName]: %w\", err)"
    - "Never return bare err"
    - "Custom sentinels: &NotFoundError{EntityType: \"...\"}, ErrRead.Join(err)"
    - "eventdealer.WorkflowError has TWO relevant fields: Error error, SkipRetry bool"
    - "SkipRetry: true for non-retryable errors (parse failures, malformed input)"
    - "SkipRetry omitted (defaults false) for retryable operational errors"

  logging:
    - "Logger is *valog.Logger stored as struct field (r.logger, s.logger)"
    - "Debug enrichment: l := r.logger; if va_grpc.IsDebugEnabled(ctx) { l = &valog.Logger{Logger: l.With(zap.String(\"statement\", stmt))} }; l.Info(...)"
    - "Always use structured zap fields: zap.String, zap.Any, zap.Error, zap.Int64s"

  database:
    - "Template execution: r.template.ExecuteTemplate(&b, \"template_name\", params)"
    - "Named queries: r.db.NamedQueryContext(ctx, stmt, params)"
    - "Named exec (writes): r.db.NamedExecContext(ctx, stmt, params)"
    - "Context timeout before I/O: ctx, cancel := context.WithTimeout(ctx, 10*time.Second); defer cancel()"

  pagination:
    - "Use sqlfunc.Paging{Limit: pageSize, Offset: offset} — NOT page*pageSize math"
    - "Caller passes offset int32 directly; ToXxxParams accepts it as a parameter"
    - "Function signature: func ToXxxParams(l *valog.Logger, req *pb.XxxRequest, offset int32) (XxxParams, error)"

  http_clients:
    - "http.NewRequestWithContext(ctx, method, url, body)"
    - "Auth: req.Header.Set(\"Authorization\", fmt.Sprintf(\"Bearer _%s\", masterKey))  ← underscore is mandatory"
    - "io.ReadAll + json.Unmarshal; check status code before unmarshal"

  retry:
    - "Use plain time.Sleep(backoff) — NOT select{case <-time.After: case <-ctx.Done():}"
    - "Context cancellation is checked at the TOP of the loop body, not inside sleep"

  aws:
    - "SDK v1 (github.com/aws/aws-sdk-go) — aws.String(), *ptr dereference on creds"
    - "credentials.NewStaticCredentials(accessKey, secretKey, token)"
    - "session.NewSession(&aws.Config{..., MaxRetries: aws.Int(5)})"

  events:
    - "Processor methods return eventdealer.WorkflowError (not error)"
    - "Happy path: return eventdealer.WorkflowError{}"
    - "Error path (retryable): return eventdealer.WorkflowError{Error: fmt.Errorf(\"...\")}"
    - "Error path (non-retryable): return eventdealer.WorkflowError{Error: fmt.Errorf(\"...\"), SkipRetry: true}"
    - "Default/unknown event: return eventdealer.WorkflowError{} (silent skip)"
