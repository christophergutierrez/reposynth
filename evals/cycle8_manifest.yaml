# ---------------------------------------------------------------------------
# Fixes applied this cycle
# ---------------------------------------------------------------------------
fixes_applied:
  - id: eventdealer_skiprotry
    description: >
      eventdealer_workflow_error reference updated to show two patterns:
      (A) CDC processor with SkipRetry: true on parse errors (non-retryable);
      (B) switch-routed processor with no SkipRetry (operational errors are
      retryable). holdout_v4 records 001–003 use SkipRetry: true — the model
      was scoring 0 on these because SkipRetry was absent from all prior training.

  - id: pagination_proto_to_params_reference
    description: >
      pagination_defaults_proto_to_params reference completely replaced.
      Old reference taught page*pageSize offset calculation — exactly the wrong
      pattern the model was generating (score 0.08 on ToRequestParams holdout).
      New reference uses sqlfunc.Paging{Limit, Offset} with a caller-supplied
      offset int32 parameter. Function also accepts *valog.Logger as first param.

  - id: contaminated_patterns_boosted
    description: >
      Five retry/HTTP patterns were heavily boosted to replace contaminated old
      records. 75 contaminated records (wrong Bearer %s and select/time.After
      retry) have been removed from the v3 historical data. The filtered baseline
      (2754 records) plus 1148 new correct records gives a clean training set.

